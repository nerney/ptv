{{ define "content" }}
<header class="site-header auth-header">
  <div class="header-brand">
    <img src="/static/icon.png" alt="" class="brand-icon">
    <span class="brand-mark">PTV</span>
    <span class="brand-sep">—</span>
    <span class="brand-sub">LOGIN</span>
  </div>
</header>

<div class="page-rule"></div>

<main class="auth-main">
  <section class="auth-card">
    <h1 class="auth-title">LOG IN</h1>

    {{ if .Error }}
    <div class="alert alert-error">
      <span class="alert-dot">●</span>{{ .Error }}
    </div>
    {{ end }}

    <form method="POST" action="/login" class="auth-form" autocomplete="off">
    {{ $.CSRFField }}
      <div class="field">
        <label class="field-label">USERNAME</label>
        <input class="field-input" type="text" name="username" required autofocus>
      </div>
      <div class="field">
        <label class="field-label">PASSWORD</label>
        <input class="field-input" type="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary auth-submit">LOG IN →</button>
    </form>
  </section>
</main>
{{ end }}
